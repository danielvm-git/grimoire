name: "Rerun Failed PR Workflows"
description: "Reruns failed GitHub Actions workflow runs on open PRs by specified authors"
schedule: "0 */3 * * *"
script: |
  #!/usr/bin/env bash
  set -uo pipefail

  # ─── Configuration ──────────────────────────────────────────────────────
  # PR authors whose failed workflows should be rerun.
  # Use GitHub username. For GitHub Apps, use "app/name" format.
  AUTHORS=(
    "lucabello"
    "app/renovate"
    "app/observability-noctua-bot"
  )
  # ────────────────────────────────────────────────────────────────────────

  reran=0

  for author in "${AUTHORS[@]}"; do
    # Search for open PRs by this author across all repos
    prs=$(gh search prs --author "$author" --state open --limit 100 \
      --json repository,number,headRefName,headRefOid \
      --jq '.[] | [.repository.nameWithOwner, (.number | tostring), .headRefName, .headRefOid] | @tsv' \
      2>/dev/null) || continue

    while IFS=$'\t' read -r repo pr_num branch head_sha; do
      [ -z "$pr_num" ] && continue

      # Find workflow runs that failed on this PR's latest commit
      run_ids=$(gh run list -R "$repo" --branch "$branch" --status failure \
        --json databaseId,headSha \
        --jq ".[] | select(.headSha == \"${head_sha}\") | .databaseId" \
        2>/dev/null) || continue

      for run_id in $run_ids; do
        echo "PR ${repo}#${pr_num} (${author}): rerunning failed jobs in run ${run_id}"
        gh run rerun "$run_id" -R "$repo" --failed 2>&1 || echo "  ↳ skipped (already in progress or cannot rerun)"
        reran=$((reran + 1))
      done
    done <<< "$prs"
  done

  if [ "$reran" -eq 0 ]; then
    echo "No failed workflow runs found for target authors' PRs."
  else
    echo "Done. Reran ${reran} workflow run(s)."
  fi
