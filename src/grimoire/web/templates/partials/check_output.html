{% if output and output.strip() %}
<pre class="text-xs whitespace-pre-wrap bg-neutral text-neutral-content p-3 rounded-box mt-2 max-h-64 overflow-y-auto font-mono">{{ output }}</pre>
{% else %}
<pre class="text-xs whitespace-pre-wrap bg-neutral text-neutral-content p-3 rounded-box mt-2 max-h-64 overflow-y-auto font-mono opacity-50">Script produced no stdout/stderr output.</pre>
{% endif %}
