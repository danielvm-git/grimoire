<div class="text-6xl mb-6">🔮</div>
<h2 class="text-2xl font-bold mb-2">Fetching repository data…</h2>
<p class="opacity-70 mb-6">Grimoire is loading data from GitHub. This may take a moment on first startup.</p>

{% if progress_total > 0 %}
<progress class="progress progress-primary w-full mb-3"
          value="{{ progress_completed }}" max="{{ progress_total }}"></progress>
<p class="text-sm font-mono-nums opacity-60">
    {{ progress_completed }} of {{ progress_total }} repositories fetched
</p>
{% else %}
<progress class="progress progress-primary w-full mb-3"></progress>
<p class="text-sm opacity-60">Preparing…</p>
{% endif %}
